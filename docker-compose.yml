services:

  db:
    image: postgres:16

    environment:
      POSTGRES_DB: blogdb
      POSTGRES_USER: bloguser
      POSTGRES_PASSWORD: password

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

  web:
    build: .

    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db
      - redis

  celery:
    build: .

    command: celery -A blog_project worker -P solo -l info

    volumes:
      - .:/app

    env_file:
      - .env

    depends_on:
      - db
      - redis

volumes:
  postgres_data: